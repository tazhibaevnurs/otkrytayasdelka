{% extends "base.html" %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
<section class="min-h-[70vh] flex items-center justify-center px-4 py-24">
  <div class="w-full max-w-md rounded-[2rem] border border-champagne/30 bg-obsidian/40 backdrop-blur p-8 text-ivory">
    {% if validlink %}
      <h1 class="font-display text-2xl mb-6">Новый пароль</h1>
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full py-3 rounded-xl bg-champagne text-obsidian font-semibold">Сохранить</button>
      </form>
    {% else %}
      <p class="text-ivory/80">Ссылка недействительна или устарела. Запросите сброс пароля снова.</p>
      <a href="{% url 'password_reset' %}" class="inline-block mt-4 text-champagne hover:underline">Новый запрос</a>
    {% endif %}
  </div>
</section>
{% endblock %}
