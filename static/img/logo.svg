<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Открытая Сделка">
  <defs>
    <linearGradient id="obs-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8D5A3"/>
      <stop offset="0.5" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#9A7B32"/>
    </linearGradient>
    <linearGradient id="obs-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF8F5"/>
      <stop offset="1" stop-color="#E8E0D4"/>
    </linearGradient>
  </defs>
  <!-- Фирменный знак: монограмма «ОС», агентство «Открытая Сделка» -->
  <rect x="3" y="3" width="122" height="122" rx="30" fill="#0D0D12" stroke="url(#obs-frame)" stroke-width="3"/>
  <text x="64" y="86" text-anchor="middle" font-family="Georgia, 'Times New Roman', Times, serif" font-size="56" font-weight="700" fill="url(#obs-fill)" letter-spacing="-0.06em">ОС</text>
</svg>
