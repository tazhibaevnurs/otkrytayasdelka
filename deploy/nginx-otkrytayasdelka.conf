# Nginx для otkrytayasdelka.kg — прокси на Django (порт 8000)
# HTTP и HTTPS в одном файле; для SSL нужны сертификаты (certbot).
#
# 504 Gateway Time-out: nginx не дождался ответа от upstream. Проверьте:
#   docker compose ps && docker compose logs -f web
#   curl -sS -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8000/
# Убедитесь, что proxy_pass указывает на тот же хост/порт, где слушает Gunicorn.
#
# Своя страница вместо «nginx/1.18.0»: скопируйте deploy/50x.html на сервер, например:
#   sudo mkdir -p /var/www/otkrytayasdelka-errors
#   sudo cp /path/to/deploy/50x.html /var/www/otkrytayasdelka-errors/50x.html
# Раскомментируйте блок error_page ниже.

server {
    listen 80;
    server_name otkrytayasdelka.kg www.otkrytayasdelka.kg;
    client_max_body_size 20M;

    # Раскомментируйте после копирования 50x.html (см. комментарий вверху файла)
    # error_page 502 503 504 /50x.html;
    # location = /50x.html {
    #     root /var/www/otkrytayasdelka-errors;
    #     internal;
    # }

    # Таймауты: иначе при медленном старте контейнера или тяжёлом запросе — 504
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 15s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

