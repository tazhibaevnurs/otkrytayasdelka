# Nginx для otkrytayasdelka.kg — прокси на Django (порт 8000)
# HTTP и HTTPS в одном файле; для SSL нужны сертификаты (certbot).

server {
    listen 80;
    server_name otkrytayasdelka.kg www.otkrytayasdelka.kg;
    client_max_body_size 20M;

    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — раскомментируйте после получения сертификата: sudo certbot --nginx -d otkrytayasdelka.kg -d www.otkrytayasdelka.kg
