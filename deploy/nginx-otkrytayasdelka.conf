# Nginx для otkrytayasdelka.kg — прокси на Django (порт 8000)
# Для HTTPS: certbot добавляет server { listen 443 ssl; ... } — скопируйте туда те же location /media/ и location /

server {
    listen 80;
    server_name otkrytayasdelka.kg www.otkrytayasdelka.kg;
    client_max_body_size 20M;

    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Если у вас уже есть отдельный server { listen 443 ssl; ... } от certbot,
# добавьте ВНУТРИ него такой же блок location /media/ (и location /):
#
#     location /media/ {
#         proxy_pass http://127.0.0.1:8000;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
#
# Иначе запросы к https://.../media/... могут не доходить до Django.
